# Shared tmux-compatible configuration for psmux v3.3.7.

# -----------------------------------------------------------------------------
# Prefix and essential bindings
# -----------------------------------------------------------------------------

# PSMux supports Home as a special key, avoiding the client JSON escaping issue
# caused by a literal backslash. Press Home twice to send Home to the active pane.
set -g prefix Home
unbind-key C-b
bind-key Home send-prefix

# Keep the one-key shortcut for opening a new window.
bind-key -n F12 new-window -c "#{pane_current_path}"

# Reload this tracked configuration with Prefix + r.
bind-key r source-file "~/.config/terminal/.tmux.conf" \; display-message "psmux config reloaded"

# Intentionally close the current session, with confirmation.
bind-key X confirm-before -p "Close this session? (y/n)" kill-session

# -----------------------------------------------------------------------------
# Windows, panes, and navigation
# -----------------------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# New windows and splits inherit the active pane's directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key '|' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation, while retaining the default arrow bindings.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Repeatable five-cell pane resizing.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Mouse, copy mode, and terminal behavior
# -----------------------------------------------------------------------------

set -g mouse on
set -g mouse-selection off
set -g pwsh-mouse-selection on
set -g scroll-enter-copy-mode off
set -g set-clipboard on

set -g history-limit 50000
set -g mode-keys vi
set -g escape-time 20
set -g focus-events on
set -g choose-tree-preview on
set -g allow-predictions on
set -g default-shell pwsh

# Flag background activity without alerting for the active window.
set -g monitor-activity on
set -g activity-action other

# -----------------------------------------------------------------------------
# Status bar and pane styling, matched to the Oh My Posh theme
# -----------------------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80

set -g status-style "bg=#003543,fg=#d8dee9"
set -g status-left "#[fg=#ffffff,bg=#0077c2,bold] #S #[fg=#0077c2,bg=#003543]"
set -g status-right "#[fg=#8aa6b3]#H #[fg=#5fb3d9]| #[fg=#ffffff]%Y-%m-%d %H:%M "

set -g window-status-separator ""
set -g window-status-format "#[fg=#8aa6b3,bg=#003543] #I:#W#F "
set -g window-status-current-format "#[fg=#003543,bg=#00a6ed,bold] #I:#W#F #[fg=#00a6ed,bg=#003543]"
set -g window-status-activity-style "fg=#ffd166,bold"

set -g pane-border-style "fg=#315866"
set -g pane-active-border-style "fg=#00a6ed"
set -g message-style "bg=#0077c2,fg=#ffffff,bold"
set -g mode-style "bg=#0077c2,fg=#ffffff"
