# Linux configuration for tmux 3.2 and newer.
#
# This intentionally mirrors the PSMux workflow while using only options and
# commands documented by upstream tmux. Linux chooses the user's login shell;
# no Windows or PowerShell-specific settings belong in this file.

# -----------------------------------------------------------------------------
# Prefix and essential bindings
# -----------------------------------------------------------------------------

# Keep the same prefix as PSMux. Press Home twice to send Home to the pane.
set-option -g prefix Home
unbind-key C-b
bind-key Home send-prefix

# Create a window without entering prefix mode.
bind-key -n F12 new-window -c "#{pane_current_path}"

# Reload ~/.tmux.conf with Prefix + r.
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Close the session deliberately, but close a window immediately.
bind-key X confirm-before -p "Close this session? (y/n)" kill-session
bind-key '&' kill-window

# -----------------------------------------------------------------------------
# Windows, panes, and navigation
# -----------------------------------------------------------------------------

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# New windows and splits inherit the active pane's directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key '|' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation, while retaining the default arrow bindings.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Repeatable five-cell pane resizing.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Mouse, copy mode, clipboard, and terminal behavior
# -----------------------------------------------------------------------------

set-option -g mouse on
set-option -g history-limit 50000
set-window-option -g mode-keys vi
set-option -s escape-time 20
set-option -s focus-events on

# Advertise the capabilities used by modern SSH clients such as Windows
# Terminal. set-clipboard uses OSC 52 to copy back to the client clipboard.
set-option -g default-terminal "tmux-256color"
set-option -as terminal-features ",xterm*:RGB:clipboard"
set-option -s set-clipboard on

# Flag activity only in background windows.
set-window-option -g monitor-activity on
set-option -g activity-action other

# -----------------------------------------------------------------------------
# Status bar and pane styling
# -----------------------------------------------------------------------------

set-option -g status on
set-option -g status-position bottom
set-option -g status-justify left
set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-right-length 80

set-option -g status-style "bg=#003543,fg=#d8dee9"
set-option -g status-left "#[fg=#ffffff,bg=#0077c2,bold] #S #[fg=#0077c2,bg=#003543]"
set-option -g status-right "#[fg=#8aa6b3]#H #[fg=#5fb3d9]| #[fg=#ffffff]%Y-%m-%d %H:%M "

set-option -g window-status-separator ""
set-option -g window-status-format "#[fg=#8aa6b3,bg=#003543] #I:#W#F "
set-option -g window-status-current-format "#[fg=#003543,bg=#00a6ed,bold] #I:#W#F #[fg=#00a6ed,bg=#003543]"
set-option -g window-status-activity-style "fg=#ffd166,bold"

set-window-option -g pane-border-style "fg=#315866"
set-window-option -g pane-active-border-style "fg=#00a6ed"
set-option -g message-style "bg=#0077c2,fg=#ffffff,bold"
set-window-option -g mode-style "bg=#0077c2,fg=#ffffff"
